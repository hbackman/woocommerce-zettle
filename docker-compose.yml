version: '3.9'
services:
  mysql:
    image: mysql:5.7
    restart: always
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: wordpress
    ports:
      - "33061:3306"
  wordpress:
    depends_on:
      - mysql
    image: wordpress:latest
    restart: always
    volumes:
      - ./:/var/www/html/wp-content/plugins/woocommerce-zettle
      - wordpress_data:/var/www/html
    ports:
      - "5000:80"
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: secret
      WORDPRESS_DEBUG: 1
  wordpress_cli:
    depends_on:
      - wordpress
    image: wordpress:cli
    command: tail -f /dev/null
    volumes:
      - ./:/var/www/html/wp-content/plugins/woocommerce-zettle
      - wordpress_data:/var/www/html
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: secret
      WORDPRESS_DEBUG: 1
volumes:
  mysql_data: {}
  wordpress_data: {}